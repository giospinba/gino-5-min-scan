<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan Results USDT - Ordinati</title>
  <style>
    :root {
      --bg: #f2f6f4;
      --card: #ffffff;
      --text: #1b2d2a;
      --muted: #49635f;
      --line: #cfe0db;
      --accent: #046c4e;
      --accent-soft: #e8f6f1;
      --btn: #0e7a59;
      --btn-hover: #0b6147;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, #d9f1e8 0%, transparent 28%),
        radial-gradient(circle at 85% 90%, #dfeef8 0%, transparent 28%),
        var(--bg);
      padding: 24px;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(8, 42, 33, 0.08);
    }

    header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #edf8f4, #e9f5fb);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #f7fcfa;
    }

    .kpi {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .kpi .label {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .kpi .value {
      margin: 4px 0 0;
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .table-wrap {
      padding: 14px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 1100px;
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #eff9f5;
      position: sticky;
      top: 0;
      z-index: 1;
      font-weight: 700;
    }

    tbody tr:nth-child(even) {
      background: #fbfefd;
    }

    tr.nuovo {
      background: #ffe066 !important;
      font-weight: 700;
    }

    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    td.symbol {
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    td.pct {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }

    .tv-btn {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      background: var(--btn);
      font-weight: 600;
      font-size: 13px;
      transition: background 120ms ease;
    }

    .tv-btn:hover {
      background: var(--btn-hover);
    }

    footer {
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      padding: 12px 16px;
      background: #fbfffd;
    }

    @media (max-width: 840px) {
      body { padding: 10px; }
      h1 { font-size: 20px; }
      .kpis { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Scan Results USDT</h1>
      <p class="sub">Ordinamento: range_pct% decrescente | Ultima scansione: 2026-05-04 06:32:35 (Europe/Rome)</p>
    </header>

    <section class="kpis" aria-label="Riepilogo">
      <article class="kpi"><p class="label">Eventi</p><p class="value">0</p></article>
      <article class="kpi"><p class="label">Simboli unici</p><p class="value">0</p></article>
      <article class="kpi"><p class="label">Range % min</p><p class="value">0.00</p></article>
      <article class="kpi"><p class="label">Range % max</p><p class="value">0.00</p></article>
    </section>

    <div class="table-wrap">
      <table aria-label="Risultati scanner USDT ordinati per percentuale">
        <thead>
          <tr>
            <th>#</th>
            <th>symbol</th>
            <th>date</th>
            <th>time_UTC+2</th>
            <th>total_range</th>
            <th>prev_close</th>
            <th>range_pct%</th>
            <th>TradingView</th>
          </tr>
        </thead>
        <tbody>
          
        </tbody>
      </table>
    </div>

    <footer>
      Fonte: scan_results_usdt.csv | Range % medio: 0.00
    </footer>
  </div>
</body>
</html>
