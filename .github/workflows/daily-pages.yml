name: Daily USDT Scan Pages

on:
  schedule:
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Time gate (run only at 20:00 Europe/Rome)
        id: time_gate
        run: |
          HOUR_ROME="$(TZ=Europe/Rome date +%H)"
          if [ "$HOUR_ROME" = "20" ]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            echo "Run enabled for 20:00 Europe/Rome"
          else
            echo "run_now=false" >> "$GITHUB_OUTPUT"
            echo "Skipping this trigger (current Europe/Rome hour: $HOUR_ROME)"
          fi

      - name: Run daily scan and build page
        if: ${{ github.event_name == 'workflow_dispatch' || steps.time_gate.outputs.run_now == 'true' }}
        env:
          BINANCE_BASE_URL: https://data-api.binance.vision
        run: |
          chmod +x scripts/daily_scan.sh
          PYTHON_BIN=python scripts/daily_scan.sh

      - name: Commit and push updated page
        if: ${{ github.event_name == 'workflow_dispatch' || steps.time_gate.outputs.run_now == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily USDT scan update"
          git push