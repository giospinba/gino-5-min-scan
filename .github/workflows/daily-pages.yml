name: Daily USDT Scan Pages

on:
  schedule:
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      run_now: ${{ steps.time_gate.outputs.run_now }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Time gate (run only at 20:00 Europe/Rome)
        id: time_gate
        run: |
          HOUR_ROME="$(TZ=Europe/Rome date +%H)"
          if [ "$HOUR_ROME" = "20" ]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            echo "Run enabled for 20:00 Europe/Rome"
          else
            echo "run_now=false" >> "$GITHUB_OUTPUT"
            echo "Skipping this trigger (current Europe/Rome hour: $HOUR_ROME)"
          fi

      - name: Run daily scan and build page
        if: ${{ github.event_name == 'workflow_dispatch' || steps.time_gate.outputs.run_now == 'true' }}
        env:
          BINANCE_BASE_URL: https://data-api.binance.vision
        run: |
          chmod +x scripts/daily_scan.sh
          PYTHON_BIN=python scripts/daily_scan.sh

      - name: Upload artifact
        if: ${{ github.event_name == 'workflow_dispatch' || steps.time_gate.outputs.run_now == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' || needs.build.outputs.run_now == 'true' }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4