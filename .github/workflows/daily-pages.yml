name: Daily USDT Scan Pages

on:
  schedule:
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets['TELEGRAM_BOT_TOKEN'] }}
      TELEGRAM_CHAT_ID: ${{ secrets['TELEGRAM_CHAT_ID'] }}
    outputs:
      run_now: ${{ steps.time_gate.outputs.run_now }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Time gate (run only at 20:00 Europe/Rome)
        id: time_gate
        run: |
          HOUR_ROME="$(TZ=Europe/Rome date +%H)"
          if [ "$HOUR_ROME" = "20" ]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            echo "Run enabled for 20:00 Europe/Rome"
          else
            echo "run_now=false" >> "$GITHUB_OUTPUT"
            echo "Skipping this trigger (current Europe/Rome hour: $HOUR_ROME)"
          fi

      - name: Snapshot previous symbols
        if: ${{ github.event_name == 'workflow_dispatch' || steps.time_gate.outputs.run_now == 'true' }}
        run: |
          PREV_FILE="$RUNNER_TEMP/prev_symbols.txt"
          : > "$PREV_FILE"
          if [[ -f docs/last_symbols.txt ]]; then
            cp docs/last_symbols.txt "$PREV_FILE"
          fi

      - name: Run daily scan and build page
        if: ${{ github.event_name == 'workflow_dispatch' || steps.time_gate.outputs.run_now == 'true' }}
        env:
          BINANCE_BASE_URL: https://data-api.binance.vision
        run: |
          chmod +x scripts/daily_scan.sh
          scripts/daily_scan.sh

      - name: Summarize scan results
        id: scan_summary
        if: ${{ github.event_name == 'workflow_dispatch' || steps.time_gate.outputs.run_now == 'true' }}
        run: |
          PREV_FILE="$RUNNER_TEMP/prev_symbols.txt"
          CURRENT_FILE="docs/last_symbols.txt"
          ADDED_FILE="$RUNNER_TEMP/added_symbols.txt"
          : > "$CURRENT_FILE"
          : > "$ADDED_FILE"

          comm -13 <(sort -u "$PREV_FILE") <(sort -u "$CURRENT_FILE") | sed '/^$/d' > "$ADDED_FILE"
          TOTAL_ROWS=$(awk -F',' 'NR > 1 && NF > 0 {count++} END {print count + 0}' scan_results_usdt.csv)
          SCAN_TIME="$(TZ=Europe/Rome date '+%Y-%m-%d %H:%M')"

          if [[ -s "$ADDED_FILE" ]]; then
            ADDED_LIST=$(awk 'NR == 1 { printf "%s", $0 } NR > 1 { printf ", %s", $0 } END { print "" }' "$ADDED_FILE")
          else
            ADDED_LIST="nessuna"
          fi

          {
            echo "added_list<<EOF"
            echo "$ADDED_LIST"
            echo "EOF"
            echo "total_rows=$TOTAL_ROWS"
            echo "scan_time=$SCAN_TIME"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Telegram scan summary
        if: ${{ (github.event_name == 'workflow_dispatch' || steps.time_gate.outputs.run_now == 'true') && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        env:
          ADDED_LIST: ${{ steps.scan_summary.outputs.added_list }}
          TOTAL_ROWS: ${{ steps.scan_summary.outputs.total_rows }}
          SCAN_TIME: ${{ steps.scan_summary.outputs.scan_time }}
        run: |
          MESSAGE=$(printf '%s\n' \
            '🔔 ULTIMA SCANSIONE - Gino 5 Min' \
            '' \
            'Stato: COMPLETATA' \
            "Coppie aggiunte: ${ADDED_LIST}" \
            "Totale coppie: ${TOTAL_ROWS}" \
            "Data scansione: ${SCAN_TIME}")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}"

      - name: Upload artifact
        if: ${{ github.event_name == 'workflow_dispatch' || steps.time_gate.outputs.run_now == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' || needs.build.outputs.run_now == 'true' }}
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets['TELEGRAM_BOT_TOKEN'] }}
      TELEGRAM_CHAT_ID: ${{ secrets['TELEGRAM_CHAT_ID'] }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Telegram failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        run: |
          NOW_ROME="$(TZ=Europe/Rome date '+%Y-%m-%d %H:%M')"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE=$(printf '%s\n' \
            '🔔 AGGIORNAMENTO PAGINA - Gino 5 Min' \
            '' \
            'Stato: ERRORE' \
            'Repo: ${{ github.repository }}' \
            'Workflow: ${{ github.workflow }}' \
            "Run: ${RUN_URL}" \
            "Data: ${NOW_ROME}")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}"