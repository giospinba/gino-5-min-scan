name: Deploy scansioni giornaliere

on:
  schedule:
    - cron: '0 20 * * *'  # Ogni sera alle 20:00 UTC (22:00 italiane ora legale)
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Esegui scansione e salva con data
        run: |
          python binance_spot_candle_analyzer.py
          DATA=$(date +"%Y%m%d")
          python build_scan_html.py --output docs/scan_${DATA}.html

      - name: Mantieni solo le ultime 3 scansioni
        run: |
          python .github/workflows/keep_last_3_scans.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
